    <line x1="100" y1="18" x2="100" y2="178" stroke="#D4A04A" stroke-width="0.5" />
    <line x1="106" y1="22" x2="106" y2="178" stroke="#D4A04A" stroke-width="0.5" />
    <line x1="112" y1="30" x2="112" y2="178" stroke="#D4A04A" stroke-width="0.5" />
