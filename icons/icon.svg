    <line x1="70.15" y1="27.94" x2="67.47" y2="21.47" stroke="#D4A04A" stroke-width="1.5" />
    <!-- Bridge -->
    <rect x="75" y="120" width="50" height="5" rx="1.5" stroke="#D4A04A" stroke-width="1.2" />
