<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="512" height="512" fill="none">
  <!-- Dark background -->
  <rect width="520" height="520" rx="64" fill="#1A1D23" />
  <!-- Banjo, centered: original 200x520 content translated right by 160 -->
  <g transform="translate(160, 0)">
    <!-- Banjo head (drum) -->
    <circle cx="100" cy="100" r="85" stroke="#D4A04A" stroke-width="2.5" />
    <circle cx="100" cy="100" r="78" stroke="#D4A04A" stroke-width="1" />
    <circle cx="100" cy="100" r="72" stroke="#D4A04A" stroke-width="0.5" stroke-dasharray="4 3" />
    <!-- Tension hooks around rim -->
    <line x1="100.00" y1="22.00" x2="100.00" y2="15.00" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="129.85" y1="27.94" x2="132.53" y2="21.47" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="155.15" y1="44.85" x2="160.10" y2="39.90" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="172.06" y1="70.15" x2="178.53" y2="67.47" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="178.00" y1="100.00" x2="185.00" y2="100.00" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="172.06" y1="129.85" x2="178.53" y2="132.53" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="155.15" y1="155.15" x2="160.10" y2="160.10" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="129.85" y1="172.06" x2="132.53" y2="178.53" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="100.00" y1="178.00" x2="100.00" y2="185.00" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="70.15" y1="172.06" x2="67.47" y2="178.53" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="44.85" y1="155.15" x2="39.90" y2="160.10" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="27.94" y1="129.85" x2="21.47" y2="132.53" stroke="#D4A04A" stroke-width="1.5" />
    <line x1="22.00" y1="100.00" x2="15.00" y2="100.00" stroke="#D4A04A" stroke-width="1.5" />
