    <circle cx="80" cy="460" r="4" stroke="#D4A04A" stroke-width="1" />
    <circle cx="80" cy="478" r="4" stroke="#D4A04A" stroke-width="1" />
    <circle cx="120" cy="460" r="4" stroke="#D4A04A" stroke-width="1" />
    <circle cx="120" cy="478" r="4" stroke="#D4A04A" stroke-width="1" />
    <!-- Decorative text -->
    <text x="100" y="498" text-anchor="middle" font-size="7" font-family="Georgia, serif" fill="#D4A04A" opacity="0.7">BANJO BUDDY</text>
  </g>
