    <circle cx="100" cy="252" r="2.5" fill="#D4A04A" opacity="0.5" />
    <circle cx="100" cy="308" r="2.5" fill="#D4A04A" opacity="0.5" />
    <circle cx="100" cy="355" r="2.5" fill="#D4A04A" opacity="0.5" />
    <!-- 5th string peg (short string - Gibson style) -->
    <circle cx="83" cy="250" r="4" stroke="#D4A04A" stroke-width="1.2" />
    <line x1="87" y1="250" x2="88" y2="250" stroke="#D4A04A" stroke-width="0.8" />
    <!-- Peghead -->
    <path d="M86 445 L86 490 Q86 505 100 505 Q114 505 114 490 L114 445" stroke="#D4A04A" stroke-width="2" fill="none" />
