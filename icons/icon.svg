    <!-- Frets -->
    <line x1="88" y1="195" x2="112" y2="195" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="233" x2="112" y2="233" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="265" x2="112" y2="265" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="293" x2="112" y2="293" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="317" x2="112" y2="317" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="338" x2="112" y2="338" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="356" x2="112" y2="356" stroke="#D4A04A" stroke-width="1" />
    <line x1="88" y1="372" x2="112" y2="372" stroke="#D4A04A" stroke-width="1" />
